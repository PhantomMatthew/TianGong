services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgres://tiangong:tiangong@postgres:5432/tiangong?sslmode=disable

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=tiangong
      - POSTGRES_USER=tiangong
      - POSTGRES_PASSWORD=tiangong
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
